version: "3.9"

services:

  frontend:
    build:
      context: ./frontend
    container_name: siakad-frontend
    restart: unless-stopped
    networks:
      - siakad-network

  backend:
    build:
      context: ./backend
    container_name: siakad-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - minio
    networks:
      - siakad-network

  db:
    image: mysql:8.0
    container_name: siakad-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

    networks:
      - siakad-network

  minio:
    image: minio/minio:latest
    container_name: siakad-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    networks:
      - siakad-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: siakad-phpmyadmin
    restart: unless-stopped

    environment:
      PMA_HOST: db
      PMA_PORT: 3306

    ports:
      - "8080:80"

    depends_on:
      - db

    networks:
      - siakad-network

  nginx:
    image: nginx:alpine
    container_name: siakad-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    networks:
      - siakad-network

networks:
  siakad-network:
    driver: bridge

volumes:
  mysql_data:
  minio_data: